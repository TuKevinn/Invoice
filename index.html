<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Pelunasan</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family:"Times New Roman", serif;
    margin:20px;
    background:#eee;
}

/* FORM */
.form-box{
    background:#fff;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ccc;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.form-box input, .form-box button{
    padding:8px;
    flex:1 1 150px;
}

/* ===== INVOICE FIX A4 ===== */
#invoiceArea{
    width:794px;          /* FIX ukuran A4 */
    background:white;
    padding:20px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid black;
    padding:8px;
    font-size:16px;
}

.right{text-align:right;}
.bold{font-weight:bold;}
.total{font-weight:bold;font-size:18px;}

/* HP hanya scroll */
@media(max-width:820px){
    #invoiceArea{
        transform:scale(0.85);
        transform-origin:top left;
    }
}
</style>
</head>
<body>

<div class="form-box">
<input type="date" id="tanggal">
<input type="text" id="villa" placeholder="Nama Villa">
<input type="text" id="alamat" placeholder="Alamat">
<input type="text" id="barang" placeholder="Nama Barang">
<input type="number" id="qty" value="1" min="1">
<input type="number" id="harga" placeholder="Harga">
<button onclick="tambahBarang()">Tambah</button>
<button onclick="savePDF()">Save PDF</button>
<button onclick="saveImage()">Save Image</button>
</div>

<div id="invoiceArea">

<table>
<tr>
<td style="font-size:28px;font-weight:bold;">
Wayan Harta <br>
<span style="font-size:18px;">+62 858-5650-6126</span>
</td>
<td class="right" style="font-size:20px;">
Invoice Pelunasan
</td>
</tr>

<tr>
<td>Ditagih kepada</td>
<td class="right">Tanggal: <span id="viewTanggal"></span></td>
</tr>

<tr>
<td><span id="viewVilla"></span></td>
<td></td>
</tr>

<tr>
<td><span id="viewAlamat"></span></td>
<td></td>
</tr>

<tr><td colspan="2" style="height:20px;"></td></tr>

<tr class="bold">
<td>Barang</td>
<td class="right">Jumlah</td>
</tr>

<tbody id="tabelBarang"></tbody>

<tr>
<td>Bank BNI : 0583495033 a.n I WAYAN HARTA WIRAWAN</td>
<td class="right total">Total: Rp <span id="totalHarga">0</span></td>
</tr>

</table>
</div>

<script>
let total=0;

tanggal.oninput=()=>viewTanggal.innerText=formatTanggal(tanggal.value);
villa.oninput=()=>viewVilla.innerText=villa.value;
alamat.oninput=()=>viewAlamat.innerText=alamat.value;

function tambahBarang(){
let nama=barang.value;
let qtyVal=parseInt(qty.value);
let hargaVal=parseInt(harga.value);

if(!nama||!qtyVal||!hargaVal){alert("Lengkapi data!");return;}

let subtotal=qtyVal*hargaVal;
total+=subtotal;

tabelBarang.innerHTML+=`
<tr>
<td>${nama} (${qtyVal} x Rp ${hargaVal.toLocaleString()})</td>
<td class="right">Rp ${subtotal.toLocaleString()}</td>
</tr>`;

totalHarga.innerText=total.toLocaleString();
barang.value="";harga.value="";qty.value=1;
}

function formatTanggal(t){
const bulan=["Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"];
let d=new Date(t);
return d.getDate()+" "+bulan[d.getMonth()]+" "+d.getFullYear();
}

/* SAVE IMAGE */
function saveImage(){
html2canvas(invoiceArea,{scale:3}).then(canvas=>{
let link=document.createElement("a");
link.download="invoice.png";
link.href=canvas.toDataURL("image/png");
link.click();
});
}

/* SAVE PDF PERFECT A4 */
function savePDF(){
html2canvas(invoiceArea,{scale:3}).then(canvas=>{
const {jsPDF}=window.jspdf;
const pdf=new jsPDF("p","mm","a4");
let img=canvas.toDataURL("image/png");
pdf.addImage(img,"PNG",0,0,210,canvas.height*210/canvas.width);
pdf.save("invoice.pdf");
});
}
</script>

</body>
</html>
