<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Pelunasan</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: "Times New Roman", serif;
    margin: 10px;
    background: #eee;
}

/* FORM - Dibuat lebih rapi di HP */
.form-box {
    background: #fff;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    display: flex;
    flex-direction: column; /* Stack vertikal di HP */
    gap: 10px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
}

@media(min-width: 600px) {
    .form-box {
        flex-direction: row;
        flex-wrap: wrap;
    }
    .form-box input { flex: 1 1 150px; }
}

/* ===== INVOICE RESPONSIVE ===== */
#invoiceArea {
    width: 100%;             /* Full lebar di HP */
    max-width: 794px;        /* Maksimal ukuran A4 di desktop */
    background: white;
    padding: 20px;
    margin: auto;
    box-sizing: border-box;  /* Pastikan padding tidak nambah lebar */
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;    /* Mencegah tabel melebar keluar */
}

td {
    border: 1px solid black;
    padding: 8px;
    font-size: 14px;        /* Ukuran font sedikit lebih kecil agar aman */
    word-wrap: break-word;  /* Teks panjang akan turun ke bawah */
}

.right { text-align: right; }
.bold { font-weight: bold; }
.total { font-weight: bold; font-size: 16px; }

/* Menghilangkan border pada header agar bersih */
.no-border td { border: none; }

</style>
</head>
<body>

<div class="form-box">
    <input type="date" id="tanggal">
    <input type="text" id="villa" placeholder="Nama Villa">
    <input type="text" id="alamat" placeholder="Alamat">
    <input type="text" id="barang" placeholder="Nama Barang">
    <input type="number" id="qty" value="1" min="1">
    <input type="number" id="harga" placeholder="Harga">
    <button onclick="tambahBarang()" style="background: #28a745; color: white; border: none; cursor: pointer;">Tambah</button>
    <button onclick="savePDF()" style="background: #007bff; color: white; border: none; cursor: pointer;">Save PDF</button>
    <button onclick="saveImage()" style="background: #6c757d; color: white; border: none; cursor: pointer;">Save Image</button>
</div>

<div id="invoiceArea">
    <table>
        <tr class="no-border">
            <td style="font-size:24px; font-weight:bold; width: 60%;">
                Wayan Harta <br>
                <span style="font-size:16px; font-weight: normal;">+62 858-5650-6126</span>
            </td>
            <td class="right" style="font-size:18px; vertical-align: top;">
                <b>Invoice Pelunasan</b>
            </td>
        </tr>

        <tr>
            <td>Ditagih kepada:</td>
            <td class="right">Tanggal: <span id="viewTanggal">-</span></td>
        </tr>
        <tr>
            <td><b id="viewVilla">-</b></td>
            <td></td>
        </tr>
        <tr>
            <td><span id="viewAlamat">-</span></td>
            <td></td>
        </tr>

        <tr style="background: #f0f0f0;">
            <td class="bold">Barang</td>
            <td class="right bold" style="width: 30%;">Jumlah</td>
        </tr>

        <tbody id="tabelBarang">
            </tbody>

        <tr>
            <td style="font-size: 12px;">Bank BNI : 0583495033 <br> a.n I WAYAN HARTA WIRAWAN</td>
            <td class="right total">Total: <br>Rp <span id="totalHarga">0</span></td>
        </tr>
    </table>
</div>

<script>
let total = 0;

// Update real-time
document.getElementById('tanggal').oninput = (e) => document.getElementById('viewTanggal').innerText = formatTanggal(e.target.value);
document.getElementById('villa').oninput = (e) => document.getElementById('viewVilla').innerText = e.target.value;
document.getElementById('alamat').oninput = (e) => document.getElementById('viewAlamat').innerText = e.target.value;

function tambahBarang() {
    let barang = document.getElementById('barang');
    let qty = document.getElementById('qty');
    let harga = document.getElementById('harga');
    
    let nama = barang.value;
    let qtyVal = parseInt(qty.value);
    let hargaVal = parseInt(harga.value);

    if (!nama || !qtyVal || !hargaVal) { alert("Lengkapi data!"); return; }

    let subtotal = qtyVal * hargaVal;
    total += subtotal;

    document.getElementById('tabelBarang').innerHTML += `
    <tr>
        <td>${nama} <br><small>${qtyVal} x Rp ${hargaVal.toLocaleString('id-ID')}</small></td>
        <td class="right">Rp ${subtotal.toLocaleString('id-ID')}</td>
    </tr>`;

    document.getElementById('totalHarga').innerText = total.toLocaleString('id-ID');
    barang.value = ""; harga.value = ""; qty.value = 1;
}

function formatTanggal(t) {
    if(!t) return "-";
    const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    let d = new Date(t);
    return d.getDate() + " " + bulan[d.getMonth()] + " " + d.getFullYear();
}

function saveImage() {
    const area = document.getElementById('invoiceArea');
    // Paksa lebar ke 794px sesaat sebelum capture agar hasil gambar konsisten
    const originalWidth = area.style.width;
    area.style.width = '794px';

    html2canvas(area, { scale: 2 }).then(canvas => {
        let link = document.createElement("a");
        link.download = "invoice.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        area.style.width = originalWidth; // Kembalikan ke responsive
    });
}

function savePDF() {
    const area = document.getElementById('invoiceArea');
    area.style.width = '794px'; // Paksa ukuran A4

    html2canvas(area, { scale: 2 }).then(canvas => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");
        let img = canvas.toDataURL("image/png");
        
        const imgProps = pdf.getImageProperties(img);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

        pdf.addImage(img, "PNG", 0, 0, pdfWidth, pdfHeight);
        pdf.save("invoice.pdf");
        area.style.width = ''; // Kembalikan ke responsive
    });
}
</script>

</body>
</html>
